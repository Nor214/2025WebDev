<!DOCTYPE html>
<html>
    <head>
        <title>NYC Collisions</title>
        <link href="style.css" rel="stylesheet" type="text/css" />
        <script src="script.js"></script>
    </head>
    <body onload="startup()">
        <div>
            <div class="top">
                <input type="text" placeholder="Enter Streetname(ALL CAPS)" id="Street" class="edge">
                <input type="button" value="Search" onclick="SearchByStreet()" class="edge">
                <input type="text" placeholder="Enter Vehicle" id="Vehicle" class="edge">
                <input type="button" value="Search" onclick="SearchByVehicle()" class="edge">
                <input type="text" placeholder="Enter Borough(ALL CAPS)" id="Borough" class="edge">
                <input type="button" value="Search" onclick="SearchByBorough()" class="edge">
            </div>
            <div id="output"> </div>
        </div>
    </body>
</html>
